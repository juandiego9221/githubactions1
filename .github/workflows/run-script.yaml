name: hello
on:
    push:
        branches: [main]
jobs:
    run:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: setup python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: run script
              run: python example.py
